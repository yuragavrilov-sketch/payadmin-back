services:
  postgres:
    image: postgres:16-alpine
    container_name: pay-admin-postgres
    environment:
      POSTGRES_DB: pay_admin
      POSTGRES_USER: pay_admin
      POSTGRES_PASSWORD: pay_admin
    ports:
      - "5432:5432"
    volumes:
      - pay-admin-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pay_admin -d pay_admin"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak-db:
    image: postgres:16-alpine
    container_name: pay-admin-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - pay-admin-kc-pg:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: pay-admin-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    depends_on:
      - keycloak-db

volumes:
  pay-admin-pg:
  pay-admin-kc-pg:
