image:
  repository: harbor.online.tkbbank.ru/tkbpay/payadmin-back

serviceAccount:
  name: pay-service

vault:
  enabled: false

replicaCount: 2

ingress:
  enabled: true
  hosts:
    - pay-admin-api.payk8s.transcapital.com
  annotations:
    kubernetes.io/ingress.class: "nginx"

ports:
  - containerPort: 8081

service:
  name: payadmin-back
  port: 8081
  targetPort: 8081

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  httpGet:
    path: /actuator/health
    port: 8081

readinessProbe:
  initialDelaySeconds: 15
  periodSeconds: 5
  httpGet:
    path: /actuator/health
    port: 8081

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

extraEnvs:
  - name: APP_PROF
    value: prod
  - name: SPRING_PROFILES_ACTIVE
    value: prod
  - name: DB_URL
    value: "jdbc:postgresql://payadmin-db.pay-service.svc.cluster.local:5432/pay_admin"
  - name: DB_USER
    value: "pay_admin"
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: payadmin-db-secret
        key: password
  - name: KEYCLOAK_ISSUER
    value: "https://keycloak.prod.transcapital.com/realms/svcmgr"
