image:
  repository: harbor.online.tkbbank.ru/tkbpay/payadmin-back

serviceAccount:
  name: test-adapters

vault:
  enabled: false

replicaCount: 1

ingress:
  enabled: true
  hosts:
    - pay-admin-api.test.payk8s.transcapital.com
  annotations:
    kubernetes.io/ingress.class: "nginx"

ports:
  - containerPort: 8081

service:
  name: payadmin-back
  port: 8081
  targetPort: 8081

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  httpGet:
    path: /actuator/health
    port: 8081

readinessProbe:
  initialDelaySeconds: 15
  periodSeconds: 5
  httpGet:
    path: /actuator/health
    port: 8081

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi

# DB_URL / DB_USER / DB_PASSWORD / KEYCLOAK_ISSUER приходят из Vault через config-server
# (spring-cloud-starter-config + bootstrap.yml -> pay/app/payadmin/test).
extraEnvs:
  - name: APP_PROF
    value: test
  - name: SPRING_PROFILES_ACTIVE
    value: test
  - name: DB_SCHEMA
    value: "pay_admin"
