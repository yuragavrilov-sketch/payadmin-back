spring:
  profiles:
    # Дефолтный профиль для локального запуска. В окружениях задавать явно через SPRING_PROFILES_ACTIVE.
    default: local

  datasource:
    # Общий config-server может содержать Oracle-дефолты — фиксируем свой драйвер явно.
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:pay_admin}
        jdbc.time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: ${DB_SCHEMA:pay_admin}
    default-schema: ${DB_SCHEMA:pay_admin}
    create-schemas: true

server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    org.springframework.security: INFO
    org.springframework.cloud.config: DEBUG
    ru.copperside.admin: DEBUG
